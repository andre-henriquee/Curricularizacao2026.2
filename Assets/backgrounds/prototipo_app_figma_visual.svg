<?xml version="1.0" encoding="UTF-8"?>
<svg width="390" height="844" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8e6ec"/>
      <stop offset="100%" stop-color="#f3d1dc"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9f1f4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Header -->
  <text x="195" y="60" font-size="24" text-anchor="middle" fill="#c85d7a" font-family="Arial" font-weight="bold">
    Minha Saúde Feminina
  </text>

  <!-- Welcome -->
  <text x="20" y="110" font-size="20" fill="#6b4c57" font-family="Arial">
    Bem-vinda!
  </text>
  <text x="20" y="140" font-size="14" fill="#6b4c57" font-family="Arial">
    Como podemos ajudar hoje?
  </text>

  <!-- Illustration (simple avatar) -->
  <circle cx="310" cy="110" r="30" fill="#f4b6c2"/>
  <circle cx="300" cy="105" r="5" fill="#6b4c57"/>
  <circle cx="320" cy="105" r="5" fill="#6b4c57"/>
  <path d="M300 120 Q310 130 320 120" stroke="#6b4c57" fill="none"/>

  <!-- Cards -->
  <rect x="20" y="180" width="160" height="130" rx="20" fill="url(#card)"/>
  <circle cx="60" cy="210" r="15" fill="#f4b6c2"/>
  <text x="30" y="250" font-size="16" fill="#c85d7a" font-family="Arial">Calendário</text>
  <text x="30" y="275" font-size="12" fill="#6b4c57" font-family="Arial">Ciclo menstrual</text>

  <rect x="210" y="180" width="160" height="130" rx="20" fill="url(#card)"/>
  <rect x="250" y="195" width="30" height="20" rx="5" fill="#d6c1e8"/>
  <text x="220" y="250" font-size="16" fill="#c85d7a" font-family="Arial">Saúde e Corpo</text>
  <text x="220" y="275" font-size="12" fill="#6b4c57" font-family="Arial">Cuidados gerais</text>

  <rect x="20" y="330" width="160" height="130" rx="20" fill="url(#card)"/>
  <circle cx="60" cy="360" r="12" fill="#f8a5c2"/>
  <text x="30" y="400" font-size="16" fill="#c85d7a" font-family="Arial">Bem-estar</text>
  <text x="30" y="425" font-size="12" fill="#6b4c57" font-family="Arial">Saúde mental</text>

  <rect x="210" y="330" width="160" height="130" rx="20" fill="url(#card)"/>
  <circle cx="260" cy="360" r="12" fill="#b8a1d9"/>
  <text x="220" y="400" font-size="16" fill="#c85d7a" font-family="Arial">Dúvidas</text>
  <text x="220" y="425" font-size="12" fill="#6b4c57" font-family="Arial">Perguntas comuns</text>

  <!-- Bottom Nav -->
  <rect x="0" y="760" width="390" height="84" fill="#ffffff"/>
  <text x="50" y="800" font-size="12" fill="#c85d7a" font-family="Arial">Início</text>
  <text x="130" y="800" font-size="12" fill="#6b4c57" font-family="Arial">Áreas</text>
  <text x="210" y="800" font-size="12" fill="#6b4c57" font-family="Arial">Informes</text>
  <text x="290" y="800" font-size="12" fill="#6b4c57" font-family="Arial">Dicas</text>
</svg>
